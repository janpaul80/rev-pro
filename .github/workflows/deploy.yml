name: Deploy Rev.pro to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 217.154.11.234
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e # Exit immediately if a command exits with a non-zero status
            
            # 1. Ensure project directory exists in Home (safe location)
            PROJECT_DIR="$HOME/rev-pro"
            if [ ! -d "$PROJECT_DIR" ]; then
              echo "📂 Creating project directory at $PROJECT_DIR"
              mkdir -p "$PROJECT_DIR"
              git clone https://github.com/janpaul80/rev-pro.git "$PROJECT_DIR"
            fi
            
            cd "$PROJECT_DIR"
            echo "📥 Pulling latest changes..."
            git pull origin main
            
            # 2. Detect Docker Compose version
            if docker compose version >/dev/null 2>&1; then
              DOCKER_CMD="docker compose"
            else
              DOCKER_CMD="docker-compose"
            fi
            echo "🐳 Using $DOCKER_CMD"
            
            # 3. Ensure production environment file
            # Note: We skip complex secret injection in bootstrap to avoid failures if secrets are missing
            if [ ! -f ".env.production" ]; then
              echo "NEXT_PUBLIC_URL=https://rev-pro.dev" > .env.production
            fi
            
            # 4. Bootstrap SSL (If certs are missing)
            if [ ! -d "./nginx/ssl/live/rev-pro.dev" ]; then
              echo "🚀 Starting SSL Bootstrap..."
              # Start Nginx in bootstrap mode
              [ -f "./nginx/conf.d/rev-pro.conf" ] && mv ./nginx/conf.d/rev-pro.conf ./nginx/conf.d/rev-pro.conf.bak
              $DOCKER_CMD up -d --build
              
              # Wait for Nginx
              echo "⏳ Waiting for Nginx..."
              sleep 15
              
              # Request SSL
              echo "🔐 Requesting SSL certificates..."
              $DOCKER_CMD run --rm certbot
              
              # Restore full config
              echo "🔄 Finalizing SSL configuration..."
              [ -f "./nginx/conf.d/rev-pro.conf.bak" ] && mv ./nginx/conf.d/rev-pro.conf.bak ./nginx/conf.d/rev-pro.conf
              [ -f "./nginx/conf.d/bootstrap.conf" ] && rm ./nginx/conf.d/bootstrap.conf
              $DOCKER_CMD restart nginx
            else
              # Standard Deployment
              echo "🚢 Standard deployment update..."
              $DOCKER_CMD down
              $DOCKER_CMD build --no-cache
              $DOCKER_CMD up -d
            fi
            
            echo "✅ Rev.pro deployed successfully at $(date)"
