# Initial HTTP config for Certbot verification, then upgrades to HTTPS
server {
    listen 80;
    server_name rev-pro.dev www.rev-pro.dev;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name rev-pro.dev www.rev-pro.dev;

    # SSL certificates (managed by Certbot)
    ssl_certificate /etc/nginx/ssl/live/rev-pro.dev/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/rev-pro.dev/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # CRITICAL: Large buffers needed for Supabase auth response headers
    # (session cookies + Set-Cookie headers can exceed 8k easily)
    proxy_buffer_size           256k;
    proxy_buffers               8 256k;
    proxy_busy_buffers_size     512k;
    large_client_header_buffers 8 64k;
    client_header_buffer_size   64k;
    client_body_buffer_size     256k;
    client_max_body_size        50M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Proxy to Next.js
    location / {
        proxy_pass http://rev-pro:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Static asset caching
    location /_next/static {
        proxy_pass http://rev-pro:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
